global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/alert.rules.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node_exporter
    static_configs:
      - targets: ['172.17.0.1:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: jenkins
    metrics_path: /prometheus
    static_configs:
      - targets: ['172.17.0.1:8080']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: sdn_ping
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 10.0.1.1
          - 10.0.1.2
          - 10.1.1.1
          - 10.1.1.2
          - 10.2.1.1
          - 10.2.1.2
          - 10.3.1.1
          - 10.3.1.2
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
