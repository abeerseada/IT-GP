global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/alert.rules.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node_exporter
    static_configs:
      - targets: ['172.17.0.1:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: jenkins
    metrics_path: /prometheus
    basic_auth:
      username: 'fcis'
      password: 'fcis'
    static_configs:
      - targets: ['172.17.0.1:8080']
